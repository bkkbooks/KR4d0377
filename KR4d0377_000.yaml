body:
  text: 蘭臯集别集類三宋提要臣等謹案蘭臯集二巻宋吴錫疇撰錫疇字元倫休寕人廣南西路安撫使儆之從孫處士垕之子也錫疇四嵗而孤刻志扵學慕徐稚茅容之為人師事程若庸所傳授甚正咸淳間南康守葉閶聘為白龍洞書院堂長不赴所居每藝蘭自况因以蘭臯為號集中存詩無多盖皆晚年所自删定者儆所作竹洲集氣體髙邁錫疇承其家學故吟咏亦多有可觀宋末名流交相引重如題林逋墓之清風千載梅花共説著梅花定説君則為吕午所賞春日之燕未成家寒食雨人如中酒落花風則為方岳所賞而山居詩十首漸造平淡陸夢發羅椅輩尤亟稱之此外佳句之見於集中者尚頗不乏葢其刻意清頴雖不免過􅍱尖新而視宋季庸腐率易之作尚能稍開生面宜諸家之揄揚不置也乾隆四十三年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀蘭臯集序曩見馮深居言舊客海寜之漁亭枚舉吟社起自竹洲之客汪柳塘以下二十餘人一時雅集不減山陰余生晚學後僅及事竹坡吕公其序竹洲諸孫蘭臯君之詩實目擊之私竊謂曰此客亹亹逼人俛仰三十年憂患來歸依然倦翼故林之喜吳君袖新吟過余鶴立清秋今猶昔也讀徹至山居雜言憮然曰浸近平淡矣誠齋老子每官每集每集每變每變每進蘭皋嗜詩如嗜炙世間利達事不入其心予知君之進於詩未艾也他日相逢珊瑚扶疎髙三四尺端不止如今詩之所觀咸淳七年重九陸夢發書
