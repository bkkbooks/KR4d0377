body:
  text: 蘭臯集巻一宋吳錫疇撰春望春事今如此憑高興未䦨半簾疎雨過一院落花閒草色迷幽逕禽聲出晚山東風能育物不改鬢毛斑迂拙迂拙安吾分炎涼任世情簞瓢自鐘鼎風月即勲名春樹重重暗晴雲片片明滄波山閣外浩蕩一鷗輕晚步晚日弄晴陰徐行野逕深山寒梅韻峭林杳鶴聲沈緩水元無響飛雲豈有心頗知閒最樂天地入清吟煙波竒觀寫興層樓一望立斜暉三兩人家出翠微淺瀨欲流山影去疎簾不礙月明歸自來樵釣無榮辱到底功名有是非識得老天窮我意免教世俗踐危機林和靖墓遺稿曽無封禪文鶴歸何處但一作認孤墳清風千載梅花共說著梅花定說君春日韶光大半去匆匆幾許幽情遞不通燕未成家寒食雨人如中酒落花風一忩草憶一作逆濓溪老五畆園思一作私涑水翁無賦招魂成獨嘯一本云難獨笑且排春句荅春工蘭石畔稜稜翠葉長葳㽔紫蕊吐幽芳靈均去後無人問林密山深只自香夕陽夕陽牛背數家邨一笛聲中欲斷魂人世百年雙短鬢不知禁得幾黄昏洲上藜杖步芳洲風花㸃碧流詩情鳬泛泛心事水悠悠有約山長翠無名草自幽聲聲啼布穀夜雨足西疇寄漫客汪子美兼簡竹牖東美鴈斷無書到筆峰暮雲空自滿江東漫郎一片襟期杳子美三生習氣同身外有貲惟老硯竹邊無價是清風何時共聽簷花雨小醉㣲吟夜燭紅晚春書䇿爐熏了日閒雨餘庭砌緑迴環一春又是尋常過兩鬢誰知容易斑輕薄楊花芳草岸凄凉杜宇夕陽山不嫌貧有雙飛燕依舊銜泥自往還新荷園林春去後幽景屬池塘過雨鈿猶小吹襟風已香莫期包作饋好待集為裳太極翁何在花時愛敢忘夜坐蕭蕭下庭葉未晚閉柴門故篋捜詩讀殘燈喚酒温砧鳴深巷月犬吠隔溪邨人世如無夜勞生事更繁聞鶯湖邊春壓柳絲低雲淡風輕一杖藜伐木詩亡交道絶綿蠻空為盡情啼漁父笭箵儘自了生涯岸尾沙頭即是家入夜醉歸横短笛滿江明月浸蘆花春日從伯氏領子姪郊行寒食清明共一時柔紅開徧野棠梨繁禽聲樂風光麗弱柳陰濃日脚遲身外生涯何似酒人間局面只如棊行春莫待花飛却藉草開樽剰賦詩棣華堂先大父國録叔大父安撫教授之地堂前古桂巋然獨存花時踏月徘徊其下誦先君舊隠之詩次韻追感古桂吹香秋月明當年曾聽讀書聲角弓有賦門人在邂逅猶須問悴榮醉吟一徑碧苔深蕭閒幾醉吟野花開自落春色霽還陰涉世謀多拙逢人口欲瘖門前流水淨洗盡利名心山邨問宿問宿山村裏人烟斷復連高峰明落日危石響幽泉世事雙眉上年華兩鬢邊滄洲森萬玉飛夢月娟娟郡侯奏請為先竹洲易名因送逢原入京一封奏入五雲開褒錄儒先動九垓生意欲回洲上竹好風已遞隴頭梅誌銘標揭留幽隧諡法昭彰在曲臺去去片帆春水滑捧持飛誥看歸來友人有約未至梅破疎英餞嵗華尋梅有約過山家短牕昨夜占佳晤挑盡寒燈未肯花分題牡丹此花誰實與封王公道東皇有品量宿露低垂蒼玉佩暄風輕振紫羅裳精神因為得春久富貴何妨到晚芳醉把一枝簪帽側從教人笑老夫狂荷葭塢呈秋崖方工部怕驚啼鳥推棊罷為愛落花迂屐行窈窈緑雲春一塢遊絲飛絮弄新晴晚眺日未沈西月色東一山秋葉染霜紅鮮明恰勝春花好不似春花耐得風聞鴈暮霞天角正紅酣渺渺飛鳴鴈兩三萬里中原消息斷賴能帶得過江南僮諭小隠生涯無別事䕶持蓑笠傍鷗沙清泉頻注吟邊硯活火隨煎飯後茶趂蚤須來添鶴料便忙也去看梅花焚香掃地齊書帙客到鄰牆有酒賖遇梅初花隴上無人寄一枝疎花忽見喜生眉巖稜面瘦霜明裏瀟灑香寒月上時比姑射仙同調度與林逋老共襟期孤芳不競能堅守肯向離騷怨未知秋日西風吹雨故將寒斗室盤旋宇宙寛蘆已成花衰鬢白楓猶染葉醉容丹人間嵗月幾羊胛身外勲名一䑕肝領略秋光無限意東籬閒掇落英餐聞笛乾坤沈萬籟風露杳雙清城近更初轉山空月正明攬裘寒意重看劍壯心驚迢遞誰家笛淒涼此夜情楊花為見春風不久歸顛狂上下弄晴暉只饒天與無拘束入幕穿簾任意飛飛舞隨春去不停空條留得罩郵亭狂心未肯沾泥死猶作輕浮水上萍次韻答吳仲山聲利驅人萬轂忙何如林下翫幽芳一池草色春不盡半樹梅花月也香古錦忽分詩眼巧短牋難寄話頭長相望正恨相逢晚莫惜來過剪韭黄舟中一笑起推篷烟雲望眼中艫鳴無調樂帆飽有情風山近水偏緑䳌啼花正紅前途足竒觀行色莫怱怱次韻題純老房竹有竹便不俗蕭疎三數竿雲深茶竈濕雨過佛燈寒紀壁何年種停經了日看塵勞應可滌幾欲借蒲團元日寂寞柴門賀客疎已輸漸後飲屠蘇花情柳思開新嵗竹簡蒲團只故吾獻楚有誰能辨玉求齊正自不工竽朝來笑挽春風問亦解重青兩鬢無臨川憶舊漫浪同為逆旅人倐然離合入思頻清明上已多愁雨芍藥荼䕷各殿春不改交情山翠舊漸添老色鬢華新近來世念寒烟薄已辦青蓑理釣綸擘蟹寒蒲就縛失横行巳矣甘從五鼎烹憑恃甲戈名以躁貯藏風露敗於清蘆花洲冷霜威健竹葉杯深飲興生且與老饕成後賦正須一笑付薑橙次韻逢原偶興曽共清燈坐夜䦨依然故我只儒酸昏眸但覺看山易倦足方知行路難捫虱坐談思傲睨聞雞起舞歎衰殘閒中恰續無功記以醉為鄉儘自寛晚晴雨脚風收斷斜陽漏晚天徑蕪蛙張王花霽蝶輕儇畫思平林外詩情步屧邊無山將亦隠底用買山錢還友人詩巻壇荒杜陵後何以續詩名千里江山秀一襟風露清淡中無淺短豪處有和平細讀松間集如聞雅奏聲籠鶴本是雲霄萬里身樊籠著向緑槐陰雖然禄料曽無欠孤却寛閒自在心送春紅襯晴霞一角天小樓重上眺前川莫言春去無蹤迹盡在枝頭嫩緑邊惆悵春歸自不禁日長門巷静沈沈應知不止為花地沃沃桑麻雨露深新緑迴環暗竹扉靜中物物總天機啼鶯戯蝶渾如舊莫是春風尚未歸九日集客佳節欲酬須酩酊東籬不記幾飛觴從教烏帽吹將去且對黄花領取香世事漫勞三太息人生寛破百重陽英雄葢代今何在戯馬高臺久已荒聽雨細細簷花雨青燈耿客魂輕烟騰栢子流水響桐孫日月雙車轂乾坤一酒樽螘柯分已定人自苦追奔次韻謝元壽曽被儒冠誤謀生事事疎洲無千樹橘家有五車書疊石和苔斸移梅帶雪鉏好非人所好習氣未能除贈寫照陳生審鑑燕頷鳶肩總屬天幾何人得上凌烟且煩寫在山巖裏野服黄冠看瀑泉山中雜言小小柴門傍竹開幽深不慣有人來頗嫌老鶴無情思啄損庭前一徑苔老作山翁行輩人素衣曽不化京塵只應猿鶴無驚怨從自龍蛇有屈伸數家雞犬小成村一帶岡巒近入門怕有漁人來問訊溪流那得截雲根草色侵除雨後深天教閒靜在山林無田種秫供桑落有地栽蘭當水沈移春有檻徧京華剰種人間富貴花誰識山中窮活計眼前沃沃只桑麻得失升沈是與非紛紛世上局如棊白雲谷口横遮斷萬事山中總不知謬有生涯類蠧魚蕭然四壁一牀書兒曹未信儒冠誤猶事青燈廢耒鉏次韻題璜原僧舎魚鼔無聲晝閴沈荒碑積雨古苔侵忽飛寒雀窺齋鉢偶有馴猿聽梵音寂寂寂寂閉門坐身閒心太平豆花含雨重梧葉坐秋鳴道路風波惡山林夢寐清少狂無復在未減是詩情鸂鶒滿身文彩漫成愁一曲清池強滯留翹足有時雙睡去夢魂依舊繞滄洲桂花許多香却不多花灝氣浮空月滿家明日石壇金屑富旋收賸馥入龍茶近作桂花茶供次韻寫興不學韓公咎斗牛此心無愧許沙鷗陰晴明日自難料得失頻年已熟籌癡計空為千載慮虛名翻誤一生憂閒中菘韭皆真味絶勝羊腔進膳羞老境老境已駸駸功名負壯心昏眸雲霧隔短鬢雪霜侵身為貧長客詩因病懶吟春山歸未得門徑蘚花深客枕聞䳌烟新寒食過月皎子規來萬里他鄉恨千年故國哀忩深攲枕聴夢短到家回為爾添愁寂春風不耐催尋梅迤邐尋梅過別村歸來新月照黄昏更無可覔春風面撚斷冰髭立斷魂晚春喜友人至柳門竹巷靜生苔節序俄驚物物催一雨拉將寒食過百花讓與牡丹開若為繾綣留春日正可淋漓縱酒杯呼舞忽聞猿鶴喜兒童忙報故人來蘭臯集卷一
