  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0377_WYG_002-1a, image: WYG1186/WYG1186-0727c.png}
body:
  text: 蘭臯集卷二宋吳錫疇撰竹洲重葺仁壽堂抗章當日勇辭榮三詠循陔世念輕娛悦高堂仁者壽壅培遺植聖之清雲涵翠葆添新蔭秋逼青琅戛舊聲故址依然成棟宇水心題扁尚晶明先文肅建以娱親雨中過昱嶺下輿扶杖過山蹊雨濺征裾屐濺泥正自不禁行路苦一聲何處竹雞啼湖上聞䳌湧金門外買湖船緑樹陰陰叫杜䳌恰莫叫從城裏去有誰人肯辦歸田獨酌獨酌悠然醉應無語笑譁百年柯上螘萬事琖中蛇詩定重刪草燈挑又作花不煩眠遣客長嘯岸烏紗秋懐鴈聲叫斷一天秋寒氣憑陵季子裘莫恨蛾眉偏薄命曽知猿臂自難侯繞黄花有詩消遣持紫螯兼酒拍浮未用淒涼如宋玉月明清思滿前洲悼鶴乗化歸遼海雙籠一不開墜翎畱片雪遺迹印荒苔月朗憐孤唳琴閒憶共來瘞銘為琢石雞鶩不須猜洲上二鶴忽斃其一次韻孫艮夫贈別第一江山第一程新詩快讀逼梅清碧雲不斷飛帆急立盡檣竿晚日明揚子江頭欸乃歌一天星斗絡斜河怕無才思堪風月拾入奚囊未必多次韻葉介夫芳草垂楊浥嫩寒苔痕新過雨斑斑一年春付花開落長日庭分燕往還世事祇堪頻對酒詩情自可飽看山儘窮莫用文為送郊島曽容季孟間秋夜寂寂虛堂風露涼邊聲驚聽鴈南翔短笻夢涉秋三逕長笛思乗月一航老眼添昏如濁鏡吟懐多感類寒螿久知拙不趍時様肯羨東鄰鬬靚妝荆溪舟中對月歴眼旬餘半終宵月在天若將今嵗看僅有此畨圓寒逼鴻洲外光摇螘甕邊家山千里逺應共一嬋娟十二月十五夜姑蘇晚泊有味吟邊景無愁醉裏身如何連夜夢只是到家頻更永遲留月梅寒漏泄春吳王臺下泊訪古待清晨山行䇿蹇又山行看山不識名平林秋後薄疊嶂日邊明雲近侵衣濕泉幽照影清歸樵饒樂意笛弄兩三聲醉起水宿篙師報歇程維舟聊此問旗亭醉來頓覺鄉愁失苦被霜風吹又醒嚴灘極目飛鴻外蒼茫一渺然風清垂釣瀨月淡放梅天展卷評詩句探囊結酒緣舟中無此樂但只閉篷眠新城短棹泊新城江寛風易生帆隨潮共上烟接岸俱平冷蘂江南信孤鴻塞北聲詩成休朗誦怕有老龍驚晚山晚山欣靜對杳杳碧無垠病葉明殘照飛鴻帶斷雲自憐麋鹿性宜入鷺鷗羣世路多殊轍升沈迹已分夜感少年未識隄防老不辦坡翁大字書猶有壯心躭萬巻其如昏目負三餘睡遲祗怕中宵覺交淡從教俗軌疎瞑坐漫搜詩撥遣靈臺一片炯如初憑欄劉伯龍如鬼笑何居然幻境螘南柯世間知止人應少天下難言事最多梧葉淒涼依節序鴈聲依約自闗河憑欄莫起悲秋意老色何妨借酒酡無弦古琴寥寥誰是識琴心得趣元來不在音可惜伯牙猶未達絶弦當日恨徒深偶成酒能成病姑停飲詩怕傷時莫浪吟客又不來春欲去一簾花影哢鳴琴琴疑禽釀宻山蜂初割户銜泥梁燕已成家春愁漠漠連芳草閒過東園數落花多景樓欄干投北是神州莫怪諸公怯上樓千載潮聲如有恨猶能含怒到𤓰洲姑蘇臺歌舞聲消迹已陳危臺今日壓城闉麋遊莫恨終亡國誰把鴟夷載諫臣三高祠去越思吳居甫里並祠千載説三高到頭杞菊饒餘味不涉人間富貴勞旅舟度嵗呈范堯臣柏琖椒盤且罷休吕蒙城下泊孤舟昏燈獨照還鄉夢久客新添別嵗愁爆竹無聲驚寂寞梅花有意伴淹留明朝例是加年事不信公侯不白頭夏日雨作年豐計涼為午睡媒不煩思飲露已可洗飛埃延月簾高捲看山牖盡開心閒逢事懶褦襶且休來菊邊持螯奔火狂難改横戈事已非形模雖可恠風味故應稀玉斫雙螯潔金披一殻肥持杯籬菊畔又見醉忘歸對月有懐破晴斜月入簾陰鬢影蕭騷老不禁九十日春風與雨百千年事後猶今牡丹紅褪殘妝面杜宇聲寒故國心眼底交游期又誤飛鴻杳杳鯉沈沈哭趙成徳鶴悵東巖夜聲悲不可聞有圖留水月無句管烟雲身後空傳稾生前事作墳忍思攜手日濺淚漫紛紛重午於潛道中逢人篸艾知重午漫把青錢問酒杯豈是醉狂慵弔古獨醒不禁客愁來六和塔直上浮屠最上頭茫茫渺渺入雙眸斜陽斷鴈新秋意惹起西風一段愁次韻汪仁甫斜河炯炯鴈飛飛老却斯人天未知三逕秋光猶在菊一年心事可無詩歲華迅似離弦箭愁思多於盈杼絲寂寂空山明月裏誰拈霜竹倚風吹結屋結屋須教坐對山把茅纔此有三間澆花抱甕調停懶洗硯裁牋準備閒未問丹砂能蛻骨久知緑酒可酡顔江湖浪迹成何事抖擻歸囊句不慳夜雨漠漠春陰未肯晴空階滴㸃到平明應知不入笙歌耳來作愁人枕畔聲客思淹留為客久蕭散與心違妻病家緣廢奴逃書問稀雨荒招鶴逕苔滑釣魚磯愧爾汀頭驚滄波自在飛藍溪道中緑窈雨初歇清和日正長乳禽穿薄靄弱蔓上頹牆村市筍厨美田家麰餌香老翁扶杖出小立看移秧看山一寒未辦買山貲隨處看山總可詩人事無常山換主青山依舊不曽移秋來秋來病葉不禁風漸覺虛櫩墜片紅斜日半溪人喚渡斷雲千里鴈横空詩情得似馴鷗子世事徐觀失馬翁忻戚莫將為我役此懐拍拍自春融九日九日今朝是風吹㡌欲斜愁惟添白髪貧莫負黄花蟹上橙初熟秋登酒易賖茱萸休把玩且辦醉生涯江氏靜山堂一炷清香萬叠山依仁體艮寂然間油雲自去為霖雨千古蒼蒼只恁閒楚東嵗暮樓高霜冷漏聲遲獨立䦨干憶別離明月一奩磨後鏡踈星幾㸃刼殘棊歲寒時節難為客老日頭顱盡付詩頗覺淒涼無晤語臨風說與凍梅知重題釣臺不向雲臺戀故袍清風固自釣臺高渭川八十年烟雨豈是漁竿把不牢除夜日月跳丸嵗又除書生作計太迂踈也知窮鬼難驅逐鬱壘神荼莫用渠守嵗兒童語笑頻老翁醉擁地爐春欠伸起喚梅花說明日平頭五十人冬日日薄霜清水見沙水邊偶到野人家滿階風葉渾慵掃爲愛深紅似落花夕陽孤倚立溪頭三兩漁舟遡碧流驚起一行新宿鴈斜飛又過別汀洲誰人雅趣似林逋繞屋栽梅入畫圖淡日籠晴霜轉暖從頭看過有花無癸酉元日一聲爆竹又驚春荼壘中間寫此心忽忽行年周六甲便便癡腹擬三壬酒泉郡裏寜甘飲飯顆山頭尚苦吟強健得閒元是福何妨終老住雲林琴枕三尺焦桐稱醉眠邯鄲底用遇囘仙夢中髣髴聞流水元是山間響瀑泉別吳仲俊背人春事水趍東淺紫深紅次第空宿靄未乾桑葉雨薄羅初試楝花風詩聨鍛鍊微吟裏豪氣施行半醉中此去相逢堪幾度別懐作惡老來同山居寂寥與世如隔是非不到榮辱兩忘因憶秋崖工部嘗教以我愛山居好十詩追次其韻聊寫窮山之趣我愛山居好扶藜步晚晴俗醇存古意境寂快詩情杜老銀絲膾坡翁玉糝羮隨緣清供足儘可佚餘生我愛山居好蔬畦間蒔花筧泉歸爨舎篝火乞鄰家茁嫩貓頭荀焙芳雀舌茶野人曾拜號何用給黄麻我愛山居好乾坤自在身林泉睎隠士風月謚閒人村釀添春困庖蔬勝鼎珍幾攜蓑笠去保社在鷗津我愛山居好軒忩傍水開遊魚吹墮絮閒鶴啄荒苔有字人誰問無租吏不來寂寥門逕側數尺長蒿萊我愛山居好陶然與世忘細聽泉潄玉那羨珮鳴璫乳燕飛閒宇新篁出矮牆靜觀機不息天地為誰忙我愛山居好崖雲濕爨烟琴横雙鶴舞犁閣一牛眠酒熟花開日詩成雨霽天逢塲聊適意總結喜歡縁我愛山居好枌榆老故丘好峯當戸立逺水䕶田流鼓響移秧日耞鳴穫稻秋年豐身老健一飽外無求我愛山居好蒼一作荒磯一釣竿白鷗春水濶黄犢緑坡寛徑菊香秋晚溪梅約一作報歲寒人間幽意足詩思倚䦨干我愛山居好茶甌困解圍松邊横蘚石柳下敞漁扉細雨噞喁出斜陽觳觫歸交情殊貴賤似覺故人非我愛山居好田園在力耘樵歌風外斷猿嘯月中聞舴艋夜招鶴轆轤曉汲雲久慚呼處士未必應星文對雪婆娑舞忽凌空去散漫狂還掃地來幾片飛黏梅樹上恍疑昨夜有花開友人幽居空谷境常寂幽居趣最真蛙鳴聊當樂花發即為春白首惟詩酒青山自主賓惜無騷雅筆寫寄市朝人蘭臯集巻二
