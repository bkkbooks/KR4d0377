body:
  text: 蘭臯詩集跋蘭臯吳君元倫以吟編三十首見示予讀之如螢光水上下林影月高低簞瓢自鍾鼎風月即勲名草色迷幽徑禽聲出晚山髙峯明落日危石響幽泉此五言之佳也輕薄楊花芳草岸淒涼杜宇夕陽山以詠晚春幽夢長隨明月去寸心難逐片雲通以和友人見寄清風千載梅花共說著梅花便說君以題林和靖墓此七言之竒也至題友人幽居小檻秋忩九日與漁父聞鶯等作皆全篇有思致以三十首之詩而句妙已如此他可概見已始余每念竹洲先生以文章行義驚動一世豈無有能繼家聲者近歲逢原以詩名寔先生曽孫今蘭臯又先生之孫吳氏世不乏季子矣雖然未說因風翻柳絮須看和月上梅花非先生雪詩乎人家深蔽樹野水濶浮空非先生弋陽道中詩乎其在郡城與客夜坐達旦詩曰淡月微雲對倚樓無聲河漢自西流髙城忽起梅花弄散作晴空萬里秋其以烏紗巾餉客詩曰落托烏紗墊角巾已將清泚滌京塵請君便漉淵明酒醉後從他雪滿簪詞意清新而豪氣勃勃不可遏直與坡杜相周旋一洗郊島之寒瘦真可畏而可仰也敢為蘭皋誦之淳祐九年五月望日竹坡吕午書余嘗於何人卷中見左史公稱說著梅花定說君之句不知其竹洲後人也意王愷之珊瑚扶疎二尺美止此矣比吳君過予崖下出其寶則髙三四尺者六七株如燕未成家寒食雨人如中酒落花風者尚多也子其秘之毋使豆粥韭虀為帳下兒所笑宋詩紀事作賣彼愷輩那得與君爭長寶祐甲寅十月既望秋崖方岳拜手書蘭皋稿多竒句信如秋崖翁所謂珊瑚三四尺髙者六七株然予嘗恨王愷奢華誇一時而為如意所折遂至恍然自失使予為愷當復碎崇所示而出吾穀粟絲麻之富以誇之夫穀粟絲麻竒不如珊瑚而吾欲以此誇彼何也此適用而彼則玩而已愷能為此論崇又當恍然自失惜愷不足以知此觀蘭皋壓卷擬古深得此意而卷中感慨之作又多匪徒珊瑚之玩也茍類以是求詩則嘲風㺯月無補世教雖竒亦末矣君如不信其歸而問諸竹洲咸淳改元正月梧岡程鳴鳳拜手敬書余嘗愛竹洲先生之為偉丈夫也遊戯翰墨如戛玉鏗金迨慷慨論事顧飄飄然有封狼居胥意葢其胸中義理磅礴鬱積舉而措之事業且無留連文章特其土苴予來守是邦嘗恨老成之不可見而見其孫蘭皋人與詩俱清者也特未知視當世事還肯如竹洲先生規模布置否雖然余觀蘭臯詩集骯髒不遇之意多卞和之璞固未嘗獻非獻而不售也嗚呼其珍毖之竹洲之澤未艾也咸淳甲戌仲春華陽宇文十朋龜從父書於觀風驛以字以句以聨觀詩不若以趣觀詩字句聨驪黄也趣驪黄外也識詩之趣然後識詩之用涵用於體然後謂之詩山中雲出雨太虛此五峯翁所以進紫陽夫子之意讀吳君元倫蘭皋編體而用者與山居之什虛谷之什闇而章藏而顯鬱而不積怨而不瘁糅今古惜時日不得已而付人間事于難言使見之用厥用溥矣雖然微吟緩節歸來晚一任輕風拂面吹此紫陽後來所造也體自昭然用在何許元倫更參之則紫陽必自攷亭而返君東家云咸淳甲戌季春之朔廬陵羅椅書余年二十餘以詩遊于竹坡秋崖二先生之間二先生喜稱道蘭皋吳元倫佳句說著梅花定說君坡喜之人如中酒落花風崖喜之坡今仙去二十餘年崖亦十餘年而元倫年六十余亦四十七矣細讀摘稿如泉幽影照清者余擊節喜之幽淡靚深有賈浪仙之風而人世如無夜勞生事更繁亦古人所未道昔者山谷喜宛丘潄井掃花之詞誠齋謂後來全集別有天珍恨山谷未見余於元倫亦云葢坡崖所見者元倫中年詩而余所見者又有晚年詩元倫進而余不進則余之老矣可恥哉咸淳九年中秋前一日里人虛谷方囘敬跋晦翁言詩以三百五篇為根本翁詩為中興冠冕豈劌目鉥心有意於詩哉本深而末茂實大而華榮竹洲亦然節行事業之外詩文超軼絶塵宜鳳毛之世美也竹坡摘蘭皋五七言佳句而以竹洲吟詠妙處勉其進審言之有子美余既見之矣滎陽之有東萊豈直以詩鳴而已哉嗣徳有繼將不一書咸淳辛未仲秋浚儀王應麟題巻後
